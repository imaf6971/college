<!DOCTYPE html>
<html lang="ru">

<head>
  <meta th:replace="fragments/meta">
  <title>Группы</title>
</head>
<header th:replace="fragments/header" />

<body class="container">
  <h1>Группы</h1>
  <div th:each="specialization: ${specializations}">
    <h3 th:text="${specialization.key}"></h3>
    <table class="table">
      <thead>
        <tr>
          <th scope="col">#</th>
          <th scope="col">Номер Группы</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="group, i: ${specialization.value}">
          <td th:text="${i.count}"></td>
          <td th:text="${group.getNumberString()}">191/2</td>
        </tr>
      </tbody>
    </table>
  </div>
</body>

</html>
